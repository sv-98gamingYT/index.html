<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seviyor musun?</title><style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial;
}

.card {
    width: 90%;
    max-width: 400px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
    margin-bottom: 30px;
    font-size: 22px;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    position: relative;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

#yes {
    background: #4CAF50;
    color: white;
}

#no {
    background: #f44336;
    color: white;
    position: absolute;
}
</style></head><body><div class="card">
    <h1>Beni seviyor musun? ❤️</h1>
    <div class="buttons">
        <button id="yes">Evet</button>
        <button id="no">Hayır</button>
    </div>
    <p id="msg"></p>
</div><script>
let noBtn = document.getElementById("no");
let yesBtn = document.getElementById("yes");
let msg = document.getElementById("msg");
let noClicks = 0;

// initial position
moveNoButton();

noBtn.addEventListener("click", () => {
    noClicks++;

    // move button
    moveNoButton();

    // shrink a bit
    let scale = Math.max(0.5, 1 - noClicks * 0.1);
    noBtn.style.transform = `scale(${scale})`;

    // change color randomly
    noBtn.style.background = `hsl(${Math.random()*360},70%,50%)`;

    // yes grows slightly
    let yesScale = 1 + noClicks * 0.1;
    yesBtn.style.transform = `scale(${yesScale})`;

    // messages
    if(noClicks === 1) msg.innerText = ":(";
    if(noClicks === 2) msg.innerText = ";(";
    if(noClicks === 3) msg.innerText = "-_-";

    // hide after 4 clicks
    if(noClicks >= 4){
        noBtn.style.display = "none";
        msg.innerText = ":)";
    }
});

yesBtn.addEventListener("click", () => {
    msg.innerText = "Ben de seni seviyorum ❤️";
});

function moveNoButton(){
    let x = Math.random() * 250;
    let y = Math.random() * 100;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}
</script></body>
</html>
