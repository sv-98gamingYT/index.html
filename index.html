<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question</title><style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial;
    overflow: hidden;
}

.container {
    text-align: center;
}

h1 {
    margin-bottom: 40px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
}

#yes {
    background: #4CAF50;
    color: white;
    margin-right: 20px;
}

#no {
    background: #f44336;
    color: white;
    position: absolute;
}

.fullscreen {
    width: 100vw !important;
    height: 100vh !important;
    font-size: 40px !important;
}
</style></head><body><div class="container">
    <h1>Benii seviyor musun? ❤️</h1>
    <button id="yes">Evet</button>
    <button id="no">Hayır</button>
</div><script>
let noBtn = document.getElementById("no");
let yesBtn = document.getElementById("yes");
let noClicks = 0;

// initial random position for no button
moveNoButton();

noBtn.addEventListener("click", () => {
    noClicks++;

    // shrink no button
    let scale = Math.max(0.2, 1 - noClicks * 0.2);
    noBtn.style.transform = `scale(${scale})`;

    // change color
    noBtn.style.background = `hsl(${Math.random() * 360}, 70%, 50%)`;

    // move position
    moveNoButton();

    // grow yes button
    let yesScale = 1 + noClicks * 0.3;
    yesBtn.style.transform = `scale(${yesScale})`;

    // after 3 clicks hide no button and expand yes
    if (noClicks >= 3) {
        noBtn.style.display = "none";
        yesBtn.classList.add("fullscreen");
        yesBtn.innerText = "❤️";
    }
});

yesBtn.addEventListener("click", () => {
    alert("Ben de seni seviyorum ❤️");
});

function moveNoButton() {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}
</script></body>
</html>
