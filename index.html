<!DOCTYPE html>
<html>
<head>
    <title>Bayramınız Mübarek Olsun</title>
    <meta charset="UTF-8">
</head>

<body style="text-align:center; margin-top:100px; font-family:Arial;">

<h1>🌙 Bayramınız Mübarek Olsun 🌙</h1>

<textarea id="mesaj" placeholder="İletiniz nedir?" style="width:300px;height:100px;"></textarea><br><br>

<button onclick="gonder()">Gönder</button>

<script>
function gonder() {
    let mesaj = document.getElementById("mesaj").value;

    fetch("https://BURAYA_NGROK_LINK/mesaj", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: mesaj
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Mesaj gönderildi!");
    })
    .catch(err => {
        alert("Hata var: " + err);
    });
}
</script>

</body>
</html>
