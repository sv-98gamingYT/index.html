<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title><style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a2a6c, #0f2027);
    color: white;
    overflow: hidden;
}

.container {
    text-align: center;
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 48px;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

p {
    font-size: 18px;
    opacity: 0.8;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: gold;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Floating shapes */
.circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.2;
    animation: float 10s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-50px); }
    100% { transform: translateY(0px); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* hidden content */
.hidden {
    display: none;
    margin-top: 30px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
    backdrop-filter: blur(10px);
}
</style></head><body><div class="container">
    <h1>Hoş Geldin ✨</h1>
    <p>Devam etmek için butona bas</p>
    <button onclick="reveal()">Başla</button><div id="content" class="hidden">
    <h2>🎉 Sürpriz Açıldı 🎉</h2>
    <div class="card">
        <p>Bu site modern bir demo arayüzdür.</p>
        <p>Animasyonlar, geçişler ve etkileşimler içerir.</p>
    </div>

    <div class="card">
        <h3>Mini Not</h3>
        <input id="note" placeholder="Bir şey yaz..." style="padding:10px; border-radius:8px; border:none; width:80%;">
        <br>
        <button onclick="saveNote()">Kaydet</button>
        <p id="saved"></p>
    </div>
</div>

</div><script>
// floating circles
for (let i = 0; i < 15; i++) {
    let c = document.createElement("div");
    c.className = "circle";
    c.style.width = (Math.random() * 100 + 50) + "px";
    c.style.height = c.style.width;
    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.top = Math.random() * window.innerHeight + "px";
    c.style.background = "white";
    c.style.animationDuration = (5 + Math.random() * 10) + "s";
    document.body.appendChild(c);
}

function reveal() {
    document.getElementById("content").classList.remove("hidden");
}

function saveNote() {
    let val = document.getElementById("note").value;
    document.getElementById("saved").innerText = "Kaydedildi: " + val;
}
</script></body>
</html>
