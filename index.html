<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bayramınız Mübarek Olsun</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

h1 {
    margin-top: 80px;
    font-size: 42px;
    color: gold;
    text-shadow: 0 0 20px gold;
}

textarea {
    width: 300px;
    height: 100px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    margin-top: 20px;
}

button {
    margin-top: 15px;
    padding: 10px 25px;
    border-radius: 10px;
    border: none;
    background: gold;
    font-weight: bold;
    cursor: pointer;
}

#messages {
    margin-top: 40px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
}

.msg {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
    text-align: left;
}

/* Yıldız animasyonu */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: blink 2s infinite;
}

@keyframes blink {
    0% {opacity:0;}
    50% {opacity:1;}
    100% {opacity:0;}
}
</style>
</head>

<body>

<h1>🌙 Bayramınız Mübarek Olsun 🌙</h1>
<p>Herkese hayırlı bayramlar ✨</p>

<textarea id="input" placeholder="İletiniz nedir?"></textarea><br>
<button onclick="sendMessage()">Gönder</button>

<div id="messages"></div>

<script>
// yıldız efekti
for (let i = 0; i < 80; i++) {
    let s = document.createElement("div");
    s.className = "star";
    s.style.top = Math.random() * window.innerHeight + "px";
    s.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(s);
}

// mesaj gönder
function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (!text) return alert("Mesaj boş olamaz");

    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = text;

    document.getElementById("messages").prepend(div);

    input.value = "";
}
</script>

</body>
</html>
